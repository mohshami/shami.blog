<!doctype html>
<html lang="en" xml:lang="en">
{{- partial "head.html" . -}}
<body class="bg-light-body text-light-text">
  <div class="flex flex-col h-screen justify-between">
    {{- partial "header.html" . -}}
    <main class="mb-auto">
      <div class="md:flex max-w-screen-xl m-auto text-justify">
        <div class="w-full md:w-3/4">
          <div class="md:hidden px-8 py-5 bg-white m-3 rounded-lg">
            <form action="//google.com/search" method="get" accept-charset="UTF-8" class="search-form">
            <input class="pl-9 h-9 w-full rounded-lg border-2 border-gray-200" name="q" placeholder="Search" style="background: url('/sprite.png') no-repeat 0px -52px;" type="text">
            <input name="sitesearch" value="https://shami.blog/" type="hidden"></form>
          </div>
        {{- block "main" . }}{{- end }}
      </div>
        {{- partial "sidebar.html" . -}}
      </div>
    </main>
    {{- partial "footer.html" . -}}
  </div>
<script>
  function toggleTheme() {
    var html = document.documentElement;
    if (html.classList.contains('dark')) {
      html.classList.remove('dark');
      localStorage.setItem('theme', 'light');
    } else {
      html.classList.add('dark');
      localStorage.setItem('theme', 'dark');
    }
  }

  // Copy-to-clipboard for code blocks
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('pre').forEach(function(pre) {
      var btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.textContent = 'Copy';
      btn.setAttribute('aria-label', 'Copy code to clipboard');
      btn.addEventListener('click', function() {
        var clone = pre.cloneNode(true);
        // Remove all line number spans (Chroma uses .ln class)
        clone.querySelectorAll('.ln, [class*="ln"]').forEach(function(el) { el.remove(); });
        // Also remove any standalone number-only spans that might be line numbers
        clone.querySelectorAll('span').forEach(function(span) {
          if (/^\d+$/.test(span.textContent.trim())) {
            // Check if it looks like a line number (short, at start of line)
            if (span.textContent.trim().length < 6) {
              span.remove();
            }
          }
        });
        var text = clone.textContent.replace(/\n$/, '');
        navigator.clipboard.writeText(text).then(function() {
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
        });
      });
      pre.parentNode.insertBefore(btn, pre);
    });
  });
</script>
</body>
</html>
